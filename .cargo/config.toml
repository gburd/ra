# Cargo configuration for the RA project
#
# Linker optimization:
# For faster linking, install a faster linker and uncomment the
# appropriate section below (or set in your personal config at
# ~/.cargo/config.toml):
#
# macOS (Apple Silicon/x86_64):
#   brew install llvm
#   Then uncomment the [target.aarch64-apple-darwin] section below.
#
# Linux:
#   Install mold: https://github.com/rui314/mold
#   Then uncomment the [target.x86_64-unknown-linux-gnu] section below.

# Uncomment for macOS with LLVM lld installed via Homebrew:
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]
#
# [target.x86_64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/usr/local/opt/llvm/bin/ld64.lld"]

# Uncomment for Linux with mold:
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[alias]
# Build tasks via xtask
# Usage: cargo xtask <task>
xtask = "run --package xtask --release --"

# Build and serve documentation locally
# Usage: cargo docs
docs = "run --package xtask --release -- docs --serve"

# Just build documentation without serving
# Usage: cargo docs-build
docs-build = "run --package xtask --release -- docs"

# Run all workspace tests with nextest if available, otherwise use cargo test
# Usage: cargo test-all
test-all = "test --workspace --all-features"

# Run a workspace binary directly
# Usage: cargo bin <binary-name> [args...]
# Example: cargo bin ra-cli -- optimize --explain-format postgresql 'SELECT...'
# Note: The '--' is required to separate cargo arguments from binary arguments
bin = "run --bin"
