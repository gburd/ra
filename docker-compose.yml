version: '3.8'

services:
  ra-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RUST_LOG=info
      - ROCKET_PORT=8000
      - ROCKET_ADDRESS=0.0.0.0
      - STATIC_DIR=/app/static
    volumes:
      # Mount rules directory for hot-reload during development
      - ./rules:/app/rules:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  default:
    name: ra-network
