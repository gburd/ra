services:
  ra-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RUST_LOG=info
      - ROCKET_PORT=8000
      - ROCKET_ADDRESS=0.0.0.0
      - STATIC_DIR=/app/static
      - DATABASE_URL=postgresql://ra_test:ra_test_pass@postgres:5432/ra_testdb
    volumes:
      - ./rules:/app/rules:ro
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ra_test
      POSTGRES_PASSWORD: ra_test_pass
      POSTGRES_DB: ra_testdb
    volumes:
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ra_test -d ra_testdb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ra_root_pass
      MYSQL_USER: ra_test
      MYSQL_PASSWORD: ra_test_pass
      MYSQL_DATABASE: ra_testdb
    volumes:
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ra_test", "-pra_test_pass"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
  mysql-data:

networks:
  default:
    name: ra-network
