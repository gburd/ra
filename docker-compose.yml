services:
  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - ra-network

  postgres-ra-extension:
    build:
      context: .
      dockerfile: docker/postgres-ra-extension.Dockerfile
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ra_test
      POSTGRES_PASSWORD: ra_test_pass
      POSTGRES_DB: ra_testdb
    volumes:
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pg-ra-extension-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ra_test -d ra_testdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ra-network

  postgres-ra-proxy:
    build:
      context: .
      dockerfile: docker/postgres-ra-proxy.Dockerfile
    ports:
      - "5433:5432"
      - "8001:8001"
    environment:
      POSTGRES_USER: ra_proxy
      POSTGRES_PASSWORD: ra_proxy_pass
      POSTGRES_DB: ra_proxydb
      RA_PROXY_PORT: 8001
      RA_PROXY_LOG_LEVEL: info
      RA_PROXY_COMPARE_PLANS: "true"
      RA_PROXY_INJECT_PLANS: "false"
    volumes:
      - ./docker/start-ra-proxy.sh:/usr/local/bin/start-ra-proxy.sh:ro
      - pg-ra-proxy-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ra_proxy -d ra_proxydb && wget --quiet --tries=1 --spider http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ra-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ra-network

  postgres-15:
    image: postgres:15-alpine
    ports:
      - "5415:5432"
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: test_db
    volumes:
      - ./test-schemas:/docker-entrypoint-initdb.d:ro
      - pg15-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ra-network

  postgres-16:
    image: postgres:16-alpine
    ports:
      - "5416:5432"
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: test_db
    volumes:
      - ./test-schemas:/docker-entrypoint-initdb.d:ro
      - pg16-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ra-network

  mysql-8:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_pass
      MYSQL_DATABASE: test_db
    volumes:
      - ./test-schemas/mysql:/docker-entrypoint-initdb.d:ro
      - mysql8-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "test_user", "-ptest_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ra-network

  mariadb:
    image: mariadb:11-jammy
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_pass
      MARIADB_USER: test_user
      MARIADB_PASSWORD: test_pass
      MARIADB_DATABASE: test_db
    volumes:
      - ./test-schemas/mariadb:/docker-entrypoint-initdb.d:ro
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ra-network

  duckdb:
    image: datacatering/duckdb:latest
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ra-network

volumes:
  pg-ra-extension-data:
  pg-ra-proxy-data:
  redis-data:
  pg15-data:
  pg16-data:
  mysql8-data:
  mariadb-data:

networks:
  ra-network:
    driver: bridge
