[package]
name = "ra-regression"
version = "0.2.0"
edition = "2021"
license.workspace = true

[dependencies]
ra-core = { path = "../ra-core" }
ra-parser = { path = "../ra-parser" }
sqlparser = { version = "0.52", features = ["visitor"] }
datafusion = { version = "53.0", features = ["crypto_expressions"] }
rusqlite = { version = "0.39", features = ["bundled"] }
toml = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
sha2 = "0.10"
hex = "0.4"

[dev-dependencies]
tempfile = "3.8"
tokio = { version = "1.35", features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true