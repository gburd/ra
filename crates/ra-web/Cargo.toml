[package]
name = "ra-web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "ra-web"
path = "src/main.rs"

[dependencies]
ra-core = { workspace = true }
ra-parser = { workspace = true }
ra-compiler = { workspace = true }
ra-engine = { workspace = true }
ra-dialect = { workspace = true }
ra-isolation = { workspace = true }
ra-synthesis = { workspace = true }
ra-stats = { workspace = true }
ra-hardware = { workspace = true }
ra-adapters = { workspace = true, features = ["postgres", "mysql", "sqlite", "duckdb"] }
rocket = { workspace = true }
rocket_ws = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }
rand = { workspace = true }
sha2 = "0.10"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
rocket = { workspace = true, features = ["json"] }

[features]
integration-tests = []

[lints]
workspace = true
