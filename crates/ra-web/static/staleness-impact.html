<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics Staleness Impact - RA Optimizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .control-group input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }

        .control-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            background: white;
        }

        .value-display {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.visible {
            display: block;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .metric-card .label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .metric-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .metric-card.warning .value {
            color: #f39c12;
        }

        .metric-card.danger .value {
            color: #e74c3c;
        }

        .metric-card.success .value {
            color: #27ae60;
        }

        .recommendation {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 4px;
            margin-top: 20px;
        }

        .recommendation.success {
            background: #d4edda;
            border-left-color: #28a745;
        }

        .recommendation.danger {
            background: #f8d7da;
            border-left-color: #dc3545;
        }

        .recommendation h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Statistics Staleness Impact</h1>
            <p>Visualize how stale statistics affect query plan quality</p>
        </header>

        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label for="initialRows">Initial Rows (at ANALYZE):</label>
                    <input type="range" id="initialRows" min="1000" max="10000000" step="1000" value="1000000">
                    <div class="value-display" id="initialRowsValue">1,000,000</div>
                </div>

                <div class="control-group">
                    <label for="modifications">Modifications Since ANALYZE:</label>
                    <input type="range" id="modifications" min="0" max="5000000" step="10000" value="100000">
                    <div class="value-display" id="modificationsValue">100,000</div>
                </div>

                <div class="control-group">
                    <label for="source">Statistics Source:</label>
                    <select id="source">
                        <option value="exact">Exact Count</option>
                        <option value="sampled_10">Sampled (10% sample rate)</option>
                        <option value="sampled_50" selected>Sampled (50% sample rate)</option>
                        <option value="histogram">Histogram</option>
                        <option value="ml_model">ML Model</option>
                    </select>
                </div>
            </div>

            <button id="analyzeBtn">Analyze Staleness Impact</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing...</p>
            </div>

            <div class="results" id="results">
                <div class="metric-grid">
                    <div class="metric-card" id="stalenessCard">
                        <div class="label">Staleness Level</div>
                        <div class="value" id="staleness">-</div>
                    </div>

                    <div class="metric-card" id="confidenceCard">
                        <div class="label">Confidence Score</div>
                        <div class="value" id="confidence">-</div>
                    </div>

                    <div class="metric-card" id="planQualityCard">
                        <div class="label">Plan Quality</div>
                        <div class="value" id="planQuality">-</div>
                    </div>

                    <div class="metric-card" id="cardinalityErrorCard">
                        <div class="label">Cardinality Error</div>
                        <div class="value" id="cardinalityError">-</div>
                    </div>
                </div>

                <div class="recommendation" id="recommendation">
                    <h3>Recommendation</h3>
                    <p id="recommendationText">-</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const initialRowsSlider = document.getElementById('initialRows');
        const modificationsSlider = document.getElementById('modifications');
        const sourceSelect = document.getElementById('source');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');

        function formatNumber(num) {
            return num.toLocaleString('en-US');
        }

        function updateSliderValue(slider, displayId) {
            document.getElementById(displayId).textContent = formatNumber(parseInt(slider.value));
        }

        initialRowsSlider.addEventListener('input', () => {
            updateSliderValue(initialRowsSlider, 'initialRowsValue');
        });

        modificationsSlider.addEventListener('input', () => {
            updateSliderValue(modificationsSlider, 'modificationsValue');
        });

        analyzeBtn.addEventListener('click', async () => {
            loading.classList.add('visible');
            results.classList.remove('visible');

            const data = {
                initial_rows: parseInt(initialRowsSlider.value),
                modifications: parseInt(modificationsSlider.value),
                source: sourceSelect.value
            };

            try {
                const response = await fetch('/api/demos/staleness-impact', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                loading.classList.remove('visible');
                results.classList.add('visible');

                document.getElementById('staleness').textContent = result.staleness;
                document.getElementById('confidence').textContent = (result.confidence * 100).toFixed(1) + '%';
                document.getElementById('planQuality').textContent = (result.plan_quality * 100).toFixed(1) + '%';
                document.getElementById('cardinalityError').textContent = result.cardinality_error_pct.toFixed(1) + '%';
                document.getElementById('recommendationText').textContent = result.recommendation;

                const stalenessCard = document.getElementById('stalenessCard');
                stalenessCard.className = 'metric-card';
                if (result.staleness.includes('Fresh')) {
                    stalenessCard.classList.add('success');
                } else if (result.staleness.includes('Very')) {
                    stalenessCard.classList.add('danger');
                } else {
                    stalenessCard.classList.add('warning');
                }

                const confidenceCard = document.getElementById('confidenceCard');
                confidenceCard.className = 'metric-card';
                if (result.confidence >= 0.8) {
                    confidenceCard.classList.add('success');
                } else if (result.confidence >= 0.5) {
                    confidenceCard.classList.add('warning');
                } else {
                    confidenceCard.classList.add('danger');
                }

                const planQualityCard = document.getElementById('planQualityCard');
                planQualityCard.className = 'metric-card';
                if (result.plan_quality >= 0.8) {
                    planQualityCard.classList.add('success');
                } else if (result.plan_quality >= 0.6) {
                    planQualityCard.classList.add('warning');
                } else {
                    planQualityCard.classList.add('danger');
                }

                const cardinalityErrorCard = document.getElementById('cardinalityErrorCard');
                cardinalityErrorCard.className = 'metric-card';
                if (result.cardinality_error_pct < 5) {
                    cardinalityErrorCard.classList.add('success');
                } else if (result.cardinality_error_pct < 20) {
                    cardinalityErrorCard.classList.add('warning');
                } else {
                    cardinalityErrorCard.classList.add('danger');
                }

                const recommendation = document.getElementById('recommendation');
                recommendation.className = 'recommendation';
                if (result.should_refresh) {
                    recommendation.classList.add('danger');
                } else if (result.staleness.includes('Slightly')) {
                    recommendation.classList.add('warning');
                } else {
                    recommendation.classList.add('success');
                }

            } catch (error) {
                loading.classList.remove('visible');
                alert('Error: ' + error.message);
            }
        });

        updateSliderValue(initialRowsSlider, 'initialRowsValue');
        updateSliderValue(modificationsSlider, 'modificationsValue');
    </script>
</body>
</html>
