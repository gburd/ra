<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggregation Strategy Selection - RA Optimizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .control-group input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }

        .value-display {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.visible {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .strategy-card {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .strategy-card h2 {
            font-size: 2em;
            margin-bottom: 15px;
        }

        .strategy-card .time {
            font-size: 1.5em;
            margin: 20px 0;
            opacity: 0.9;
        }

        .strategy-card .reason {
            font-size: 1em;
            opacity: 0.95;
            line-height: 1.6;
        }

        .metrics-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
        }

        .metrics-section h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .metric-row .label {
            font-weight: 600;
            color: #666;
        }

        .metric-row .value {
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        .parallel-indicator {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 15px;
        }

        .parallel-indicator .workers {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .results.visible {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Aggregation Strategy Selection</h1>
            <p>Compare hash, streaming, and sort-based aggregation</p>
        </header>

        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label for="inputRows">Input Rows:</label>
                    <input type="range" id="inputRows" min="1000" max="100000000" step="1000" value="10000000">
                    <div class="value-display" id="inputRowsValue">10,000,000</div>
                </div>

                <div class="control-group">
                    <label for="numGroups">Number of Groups:</label>
                    <input type="range" id="numGroups" min="10" max="10000000" step="10" value="100000">
                    <div class="value-display" id="numGroupsValue">100,000</div>
                </div>

                <div class="control-group">
                    <label for="memory">Available Memory (MB):</label>
                    <input type="range" id="memory" min="10" max="10000" step="10" value="1000">
                    <div class="value-display" id="memoryValue">1,000 MB</div>
                </div>

                <div class="control-group">
                    <label for="workers">Parallel Workers:</label>
                    <input type="range" id="workers" min="1" max="64" step="1" value="8">
                    <div class="value-display" id="workersValue">8</div>
                </div>
            </div>

            <button id="analyzeBtn">Analyze Strategy</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing...</p>
            </div>

            <div class="results" id="results">
                <div class="strategy-card">
                    <h2 id="strategy">-</h2>
                    <div class="time" id="time">-</div>
                    <div class="reason" id="reasoning">-</div>
                </div>

                <div class="metrics-section">
                    <h3>Execution Metrics</h3>

                    <div class="metric-row">
                        <span class="label">Estimated Time:</span>
                        <span class="value" id="timeValue">-</span>
                    </div>

                    <div class="metric-row">
                        <span class="label">Memory Usage:</span>
                        <span class="value" id="memoryUsage">-</span>
                    </div>

                    <div class="metric-row">
                        <span class="label">Input Rows:</span>
                        <span class="value" id="inputRowsDisplay">-</span>
                    </div>

                    <div class="metric-row">
                        <span class="label">Distinct Groups:</span>
                        <span class="value" id="numGroupsDisplay">-</span>
                    </div>

                    <div class="parallel-indicator">
                        <div class="workers" id="parallelism">-</div>
                        <div>Parallel Workers</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputRowsSlider = document.getElementById('inputRows');
        const numGroupsSlider = document.getElementById('numGroups');
        const memorySlider = document.getElementById('memory');
        const workersSlider = document.getElementById('workers');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');

        function formatNumber(num) {
            return num.toLocaleString('en-US');
        }

        function formatBytes(bytes) {
            const mb = bytes / (1024 * 1024);
            if (mb >= 1024) {
                return (mb / 1024).toFixed(1) + ' GB';
            }
            if (mb >= 1) {
                return mb.toFixed(1) + ' MB';
            }
            const kb = bytes / 1024;
            return kb.toFixed(1) + ' KB';
        }

        inputRowsSlider.addEventListener('input', () => {
            document.getElementById('inputRowsValue').textContent = formatNumber(parseInt(inputRowsSlider.value));
        });

        numGroupsSlider.addEventListener('input', () => {
            document.getElementById('numGroupsValue').textContent = formatNumber(parseInt(numGroupsSlider.value));
        });

        memorySlider.addEventListener('input', () => {
            document.getElementById('memoryValue').textContent = formatNumber(parseInt(memorySlider.value)) + ' MB';
        });

        workersSlider.addEventListener('input', () => {
            document.getElementById('workersValue').textContent = workersSlider.value;
        });

        analyzeBtn.addEventListener('click', async () => {
            loading.classList.add('visible');
            results.classList.remove('visible');

            const data = {
                input_rows: parseInt(inputRowsSlider.value),
                num_groups: parseInt(numGroupsSlider.value),
                memory_bytes: parseInt(memorySlider.value) * 1024 * 1024,
                workers: parseInt(workersSlider.value)
            };

            try {
                const response = await fetch('/api/demos/aggregation-strategy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                loading.classList.remove('visible');
                results.classList.add('visible');

                document.getElementById('strategy').textContent = result.strategy;
                document.getElementById('time').textContent = result.estimated_time_ms + ' ms';
                document.getElementById('reasoning').textContent = result.reasoning;
                document.getElementById('timeValue').textContent = result.estimated_time_ms + ' ms';
                document.getElementById('memoryUsage').textContent = formatBytes(result.memory_usage);
                document.getElementById('inputRowsDisplay').textContent = formatNumber(data.input_rows);
                document.getElementById('numGroupsDisplay').textContent = formatNumber(data.num_groups);
                document.getElementById('parallelism').textContent = result.parallelism;

            } catch (error) {
                loading.classList.remove('visible');
                alert('Error: ' + error.message);
            }
        });

        document.getElementById('inputRowsValue').textContent = formatNumber(parseInt(inputRowsSlider.value));
        document.getElementById('numGroupsValue').textContent = formatNumber(parseInt(numGroupsSlider.value));
        document.getElementById('memoryValue').textContent = formatNumber(parseInt(memorySlider.value)) + ' MB';
        document.getElementById('workersValue').textContent = workersSlider.value;
    </script>
</body>
</html>
