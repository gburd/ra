<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Offloading Decision - RA Optimizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 { font-size: 2em; margin-bottom: 10px; }

        .content { padding: 30px; }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .control-group input[type="range"] { width: 100%; margin: 10px 0; }
        .value-display { font-size: 1.2em; color: #667eea; font-weight: bold; }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover { transform: translateY(-2px); }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.visible {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .decision-card {
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }

        .decision-card.gpu {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
        }

        .decision-card.cpu {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }

        .decision-card h2 { font-size: 2.5em; margin-bottom: 15px; }
        .decision-card .reason { font-size: 1.1em; line-height: 1.6; opacity: 0.95; }

        .breakdown {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
        }

        .breakdown h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .cost-row {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: white;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .cost-row .label { font-weight: 600; color: #666; }
        .cost-row .value { color: #333; font-weight: bold; }

        .loading { display: none; text-align: center; padding: 20px; }
        .loading.visible { display: block; }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .results.visible { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GPU Offloading Decision</h1>
            <p>Evaluate GPU vs CPU execution considering transfer overhead</p>
        </header>

        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label for="dataSize">Data Size (MB):</label>
                    <input type="range" id="dataSize" min="1" max="10000" step="1" value="1000">
                    <div class="value-display" id="dataSizeValue">1,000 MB</div>
                </div>

                <div class="control-group">
                    <label for="computeIntensity">Compute Intensity:</label>
                    <input type="range" id="computeIntensity" min="1" max="10" step="1" value="7">
                    <div class="value-display" id="computeIntensityValue">7 (High)</div>
                </div>

                <div class="control-group">
                    <label for="pcieBandwidth">PCIe Bandwidth (GB/s):</label>
                    <input type="range" id="pcieBandwidth" min="1" max="32" step="1" value="16">
                    <div class="value-display" id="pcieBandwidthValue">16 GB/s</div>
                </div>

                <div class="control-group">
                    <label for="gpuSpeedup">GPU Speedup Factor:</label>
                    <input type="range" id="gpuSpeedup" min="1" max="100" step="1" value="20">
                    <div class="value-display" id="gpuSpeedupValue">20x</div>
                </div>
            </div>

            <button id="analyzeBtn">Analyze GPU Offloading</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing...</p>
            </div>

            <div class="results" id="results">
                <div class="decision-card" id="decisionCard">
                    <h2 id="decision">Use GPU</h2>
                    <div class="reason" id="reasoning">-</div>
                </div>

                <div class="breakdown">
                    <h3>Cost Breakdown</h3>

                    <div class="cost-row">
                        <span class="label">CPU Execution Time:</span>
                        <span class="value" id="cpuTime">-</span>
                    </div>

                    <div class="cost-row">
                        <span class="label">GPU Execution Time:</span>
                        <span class="value" id="gpuTime">-</span>
                    </div>

                    <div class="cost-row">
                        <span class="label">PCIe Transfer Time:</span>
                        <span class="value" id="transferTime">-</span>
                    </div>

                    <div class="cost-row">
                        <span class="label">Total GPU Time:</span>
                        <span class="value" id="totalGpuTime">-</span>
                    </div>

                    <div class="cost-row">
                        <span class="label">Net Benefit:</span>
                        <span class="value" id="netBenefit">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dataSizeSlider = document.getElementById('dataSize');
        const computeIntensitySlider = document.getElementById('computeIntensity');
        const pcieBandwidthSlider = document.getElementById('pcieBandwidth');
        const gpuSpeedupSlider = document.getElementById('gpuSpeedup');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');

        function formatNumber(num) {
            return num.toLocaleString('en-US');
        }

        function getIntensityLabel(level) {
            if (level <= 3) return level + ' (Low)';
            if (level <= 6) return level + ' (Medium)';
            return level + ' (High)';
        }

        dataSizeSlider.addEventListener('input', () => {
            document.getElementById('dataSizeValue').textContent = formatNumber(parseInt(dataSizeSlider.value)) + ' MB';
        });

        computeIntensitySlider.addEventListener('input', () => {
            document.getElementById('computeIntensityValue').textContent = getIntensityLabel(parseInt(computeIntensitySlider.value));
        });

        pcieBandwidthSlider.addEventListener('input', () => {
            document.getElementById('pcieBandwidthValue').textContent = pcieBandwidthSlider.value + ' GB/s';
        });

        gpuSpeedupSlider.addEventListener('input', () => {
            document.getElementById('gpuSpeedupValue').textContent = gpuSpeedupSlider.value + 'x';
        });

        analyzeBtn.addEventListener('click', async () => {
            loading.classList.add('visible');
            results.classList.remove('visible');

            const dataSize = parseInt(dataSizeSlider.value);
            const computeIntensity = parseInt(computeIntensitySlider.value);
            const pcieBandwidth = parseFloat(pcieBandwidthSlider.value);
            const gpuSpeedup = parseFloat(gpuSpeedupSlider.value);

            // Mock calculation
            const cpuTime = dataSize * computeIntensity * 10;
            const transferTime = (dataSize / 1024) / pcieBandwidth * 1000 * 2; // Round trip
            const gpuTime = cpuTime / gpuSpeedup;
            const totalGpuTime = gpuTime + transferTime;
            const useGpu = totalGpuTime < cpuTime;
            const netBenefit = cpuTime - totalGpuTime;

            setTimeout(() => {
                loading.classList.remove('visible');
                results.classList.add('visible');

                const decisionCard = document.getElementById('decisionCard');
                decisionCard.className = 'decision-card ' + (useGpu ? 'gpu' : 'cpu');

                document.getElementById('decision').textContent = useGpu ? 'Use GPU' : 'Use CPU';

                let reasoning = '';
                if (useGpu) {
                    reasoning = `GPU offloading provides ${(cpuTime / totalGpuTime).toFixed(1)}x total speedup. `;
                    if (transferTime / totalGpuTime > 0.5) {
                        reasoning += 'Transfer overhead is significant but still worthwhile due to high compute intensity.';
                    } else {
                        reasoning += 'Low transfer overhead makes GPU execution highly beneficial.';
                    }
                } else {
                    reasoning = `PCIe transfer overhead (${transferTime.toFixed(0)}ms) exceeds GPU compute benefit. `;
                    reasoning += 'CPU execution is faster for this workload size and compute intensity.';
                }
                document.getElementById('reasoning').textContent = reasoning;

                document.getElementById('cpuTime').textContent = cpuTime.toFixed(0) + ' ms';
                document.getElementById('gpuTime').textContent = gpuTime.toFixed(0) + ' ms';
                document.getElementById('transferTime').textContent = transferTime.toFixed(0) + ' ms';
                document.getElementById('totalGpuTime').textContent = totalGpuTime.toFixed(0) + ' ms';
                document.getElementById('netBenefit').textContent = (useGpu ? '+' : '') + netBenefit.toFixed(0) + ' ms';

            }, 500);
        });

        document.getElementById('dataSizeValue').textContent = formatNumber(parseInt(dataSizeSlider.value)) + ' MB';
        document.getElementById('computeIntensityValue').textContent = getIntensityLabel(parseInt(computeIntensitySlider.value));
        document.getElementById('pcieBandwidthValue').textContent = pcieBandwidthSlider.value + ' GB/s';
        document.getElementById('gpuSpeedupValue').textContent = gpuSpeedupSlider.value + 'x';
    </script>
</body>
</html>
