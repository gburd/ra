<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Algorithm Selection - RA Optimizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .control-group input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }

        .value-display {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.visible {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .result-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
        }

        .result-section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .selected-algorithm {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .selected-algorithm h3 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: white;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .metric-row .label {
            font-weight: 600;
            color: #666;
        }

        .metric-row .value {
            color: #333;
            font-weight: bold;
        }

        .alternative-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #e74c3c;
        }

        .alternative-card h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .alternative-card .cost {
            font-size: 1.3em;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .alternative-card .reason {
            color: #666;
            font-style: italic;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .results.visible {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Join Algorithm Selection</h1>
            <p>Compare hash join, nested loop, and sort-merge algorithms</p>
        </header>

        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label for="leftSize">Left Table Size (rows):</label>
                    <input type="range" id="leftSize" min="100" max="10000000" step="100" value="100000">
                    <div class="value-display" id="leftSizeValue">100,000</div>
                </div>

                <div class="control-group">
                    <label for="rightSize">Right Table Size (rows):</label>
                    <input type="range" id="rightSize" min="100" max="10000000" step="100" value="50000">
                    <div class="value-display" id="rightSizeValue">50,000</div>
                </div>

                <div class="control-group">
                    <label for="selectivity">Join Selectivity:</label>
                    <input type="range" id="selectivity" min="0.001" max="1.0" step="0.001" value="0.1">
                    <div class="value-display" id="selectivityValue">10%</div>
                </div>

                <div class="control-group">
                    <label for="memory">Available Memory (MB):</label>
                    <input type="range" id="memory" min="10" max="10000" step="10" value="1000">
                    <div class="value-display" id="memoryValue">1,000 MB</div>
                </div>
            </div>

            <button id="analyzeBtn">Analyze Join Algorithm</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing...</p>
            </div>

            <div class="results" id="results">
                <div class="result-section">
                    <h2>Selected Algorithm</h2>
                    <div class="selected-algorithm">
                        <h3 id="algorithm">-</h3>
                        <p id="reasoning">-</p>
                    </div>

                    <div class="metric-row">
                        <span class="label">Estimated Cost:</span>
                        <span class="value" id="cost">-</span>
                    </div>

                    <div class="metric-row">
                        <span class="label">Output Rows:</span>
                        <span class="value" id="outputRows">-</span>
                    </div>

                    <div class="metric-row">
                        <span class="label">Memory Usage:</span>
                        <span class="value" id="memoryUsage">-</span>
                    </div>
                </div>

                <div class="result-section">
                    <h2>Alternatives Considered</h2>
                    <div id="alternatives"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const leftSizeSlider = document.getElementById('leftSize');
        const rightSizeSlider = document.getElementById('rightSize');
        const selectivitySlider = document.getElementById('selectivity');
        const memorySlider = document.getElementById('memory');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');

        function formatNumber(num) {
            return num.toLocaleString('en-US');
        }

        function formatBytes(bytes) {
            const mb = bytes / (1024 * 1024);
            if (mb >= 1) {
                return mb.toFixed(1) + ' MB';
            }
            const kb = bytes / 1024;
            return kb.toFixed(1) + ' KB';
        }

        leftSizeSlider.addEventListener('input', () => {
            document.getElementById('leftSizeValue').textContent = formatNumber(parseInt(leftSizeSlider.value));
        });

        rightSizeSlider.addEventListener('input', () => {
            document.getElementById('rightSizeValue').textContent = formatNumber(parseInt(rightSizeSlider.value));
        });

        selectivitySlider.addEventListener('input', () => {
            const pct = (parseFloat(selectivitySlider.value) * 100).toFixed(1);
            document.getElementById('selectivityValue').textContent = pct + '%';
        });

        memorySlider.addEventListener('input', () => {
            document.getElementById('memoryValue').textContent = formatNumber(parseInt(memorySlider.value)) + ' MB';
        });

        analyzeBtn.addEventListener('click', async () => {
            loading.classList.add('visible');
            results.classList.remove('visible');

            const data = {
                left_size: parseInt(leftSizeSlider.value),
                right_size: parseInt(rightSizeSlider.value),
                selectivity: parseFloat(selectivitySlider.value),
                memory_bytes: parseInt(memorySlider.value) * 1024 * 1024
            };

            try {
                const response = await fetch('/api/demos/join-algorithm', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                loading.classList.remove('visible');
                results.classList.add('visible');

                document.getElementById('algorithm').textContent = result.algorithm;
                document.getElementById('reasoning').textContent = result.reasoning;
                document.getElementById('cost').textContent = result.estimated_cost.toFixed(0);
                document.getElementById('outputRows').textContent = formatNumber(result.output_rows);
                document.getElementById('memoryUsage').textContent = formatBytes(result.memory_usage);

                const alternativesDiv = document.getElementById('alternatives');
                alternativesDiv.innerHTML = '';

                result.alternatives.forEach(alt => {
                    const card = document.createElement('div');
                    card.className = 'alternative-card';
                    card.innerHTML = `
                        <h4>${alt.algorithm}</h4>
                        <div class="cost">Cost: ${alt.cost.toFixed(0)}</div>
                        <div class="reason">${alt.reason}</div>
                    `;
                    alternativesDiv.appendChild(card);
                });

            } catch (error) {
                loading.classList.remove('visible');
                alert('Error: ' + error.message);
            }
        });

        document.getElementById('leftSizeValue').textContent = formatNumber(parseInt(leftSizeSlider.value));
        document.getElementById('rightSizeValue').textContent = formatNumber(parseInt(rightSizeSlider.value));
        document.getElementById('selectivityValue').textContent = (parseFloat(selectivitySlider.value) * 100).toFixed(1) + '%';
        document.getElementById('memoryValue').textContent = formatNumber(parseInt(memorySlider.value)) + ' MB';
    </script>
</body>
</html>
