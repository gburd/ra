# =============================================================================
# SQL Function Catalog for RA Query Optimizer
# =============================================================================
# 200+ function definitions with behavioral properties and cost metadata.
# The optimizer uses this catalog for constant folding, pushdown decisions,
# expression index matching, and per-row cost estimation.
#
# Properties:
#   deterministic   - same inputs always produce same output
#   inlineable      - function body can be expanded inline
#   expensive       - high per-row cost (affects join ordering)
#   pure            - no side effects, no external state
#   constant_foldable - can evaluate at plan time when all args are constants
#   cost_multiplier - relative cost vs a simple comparison (1.0 baseline)
# =============================================================================

