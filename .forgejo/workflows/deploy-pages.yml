# Codeberg Pages Deployment Workflow
#
# This workflow automatically builds and deploys documentation to Codeberg Pages
# when changes are pushed to the main branch.
#
# Setup required:
# 1. Enable Actions in repository Settings → Units
# 2. Create Codeberg access token with 'repository' scope
# 3. Add token as secret: PAGES_TOKEN
#
# Documentation will be available at: https://[username].codeberg.page/ra/

name: Deploy to Codeberg Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.forgejo/workflows/deploy-pages.yml'

jobs:
  build-and-deploy:
    name: Build and deploy documentation
    runs-on: docker
    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: https://github.com/actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22

      - name: Build VitePress documentation
        run: |
          cd docs
          npm ci
          npm run build

      - name: Create pages output
        run: |
          mkdir -p pages-output
          cp -r docs/.vitepress/dist/* pages-output/

      - name: Deploy to pages branch
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          cd pages-output
          git init
          git config user.name "Forgejo Actions"
          git config user.email "actions@codeberg.org"
          git add .
          git commit -m "Deploy documentation"
          git push --force "https://x-access-token:${PAGES_TOKEN}@codeberg.org/${{ gitea.repository }}.git" HEAD:pages
