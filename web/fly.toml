# Fly.io deployment configuration for RA web frontend.
# The frontend is a static Vite build served by a lightweight container.

app = "ra-explorer"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[env]
  NODE_ENV = "production"
