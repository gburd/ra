name: E2E Tests

on:
  push:
    branches: [main, phase4-docker-compose]
    paths:
      - 'crates/ra-web/**'
      - 'e2e/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/ra-web/**'
      - 'e2e/**'
      - '.github/workflows/e2e-tests.yml'

jobs:
  e2e-tests:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ra_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6  # v4.0.4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: crates/ra-web/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: crates/ra-web/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: crates/ra-web/frontend
        run: npx playwright install --with-deps chromium

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab  # v2.7.5

      - name: Build backend
        run: cargo build --release --bin ra-web

      - name: Start backend server
        run: |
          cargo run --release --bin ra-web &
          sleep 10
          curl -f http://localhost:8080/health || exit 1
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ra_test
          RUST_LOG: info

      - name: Run E2E tests
        working-directory: crates/ra-web/frontend
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874  # v4.4.0
        if: always()
        with:
          name: playwright-report
          path: crates/ra-web/frontend/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874  # v4.4.0
        if: failure()
        with:
          name: playwright-screenshots
          path: crates/ra-web/frontend/test-results/
          retention-days: 7
