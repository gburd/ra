name: Docker Build and Test

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'crates/ra-web/**'
      - 'docs/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
      - 'crates/ra-web/**'
      - 'docs/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker.yml'

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  build-docs:
    name: Build docs image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1

      - name: Build docs image
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85  # v6.7.0
        with:
          context: ./docs
          file: ./docs/Dockerfile
          push: false
          tags: ra-docs:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ra-web:
    name: Build ra-web image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1

      - name: Build ra-web image
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85  # v6.7.0
        with:
          context: .
          file: ./crates/ra-web/Dockerfile
          push: false
          tags: ra-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-postgres-extension:
    name: Build postgres-ra-extension image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1

      - name: Build postgres-ra-extension image
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85  # v6.7.0
        with:
          context: .
          file: ./docker/postgres-ra-extension.Dockerfile
          push: false
          tags: postgres-ra-extension:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-docker-compose:
    name: Test docker-compose
    runs-on: ubuntu-latest
    needs: [build-docs, build-ra-web]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1

      - name: Start services
        run: |
          docker compose up -d docs ra-web redis postgres-15
          sleep 30

      - name: Check service health
        run: |
          docker compose ps
          docker compose logs

      - name: Test docs health
        run: |
          curl -f http://localhost:3000/health || exit 1

      - name: Test ra-web health
        run: |
          curl -f http://localhost:8000/health || exit 1

      - name: Test ra-web API
        run: |
          curl -f -X POST http://localhost:8000/api/optimize \
            -H "Content-Type: application/json" \
            -d '{"expr":{"Scan":{"table":"users"}}}' || exit 1

      - name: Test PostgreSQL connection
        run: |
          PGPASSWORD=test_pass psql -h localhost -p 5415 -U test_user -d test_db -c 'SELECT 1;' || exit 1

      - name: Test Redis
        run: |
          docker compose exec -T redis redis-cli ping | grep -q 'PONG' || exit 1

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs

      - name: Stop services
        if: always()
        run: |
          docker compose down -v

  validate-dockerfiles:
    name: Validate Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          persist-credentials: false

      - name: Run hadolint on docs Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: ./docs/Dockerfile
          ignore: DL3018,DL3059

      - name: Run hadolint on ra-web Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: ./crates/ra-web/Dockerfile
          ignore: DL3018,DL3059

      - name: Run hadolint on postgres-ra-extension Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: ./docker/postgres-ra-extension.Dockerfile
          ignore: DL3008,DL3059

      - name: Run hadolint on postgres-ra-proxy Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: ./docker/postgres-ra-proxy.Dockerfile
          ignore: DL3008,DL3059

  security-scan:
    name: Security scan images
    runs-on: ubuntu-latest
    needs: [build-docs, build-ra-web]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1

      - name: Build docs image for scanning
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85  # v6.7.0
        with:
          context: ./docs
          file: ./docs/Dockerfile
          push: false
          load: true
          tags: ra-docs:scan

      - name: Scan docs image
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8  # 0.24.0
        with:
          image-ref: ra-docs:scan
          format: sarif
          output: trivy-docs.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@4dd16135b69a43b6c8efb853346f8437d92d3c93  # v3.26.6
        with:
          sarif_file: trivy-docs.sarif
          category: docker-docs
