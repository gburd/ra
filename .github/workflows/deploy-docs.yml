name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'crates/**'
      - 'rules/**'
      - '.github/workflows/deploy-docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22

      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a  # v21
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39  # v13

      - uses: dtolnay/rust-toolchain@b4406b2e3e89e93b13a5b0c9b6f2ee2c8fe9aa7f  # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM docs module
        run: |
          if [ -d "crates/ra-wasm-docs" ]; then
            cd crates/ra-wasm-docs && wasm-pack build --target web
          fi

      - name: Build VitePress documentation
        run: |
          cd docs
          npm ci
          npm run build

      - name: Build rustdoc
        run: nix develop --command cargo doc --no-deps --all-features

      - name: Combine documentation
        run: |
          mkdir -p combined-docs
          # Copy VitePress output as main documentation
          if [ -d "docs/.vitepress/dist" ]; then
            cp -r docs/.vitepress/dist/* combined-docs/
          fi
          # Add Rust API docs under /api/rust/
          mkdir -p combined-docs/api/rust
          cp -r target/doc/* combined-docs/api/rust/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4.0.0
        with:
          path: combined-docs

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
