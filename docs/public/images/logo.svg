<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#1a6fa0"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#67b8e3"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="192" height="192" rx="40" fill="url(#bg)"/>

  <!-- Decorative inner border -->
  <rect x="9" y="9" width="182" height="182" rx="36"
        fill="none" stroke="url(#acc)" stroke-width="0.7" opacity="0.25"/>

  <!-- Query tree nodes (background decoration) -->
  <g opacity="0.12" fill="#fff">
    <circle cx="100" cy="30" r="4"/>
    <circle cx="72" cy="46" r="3"/>
    <circle cx="128" cy="46" r="3"/>
    <line x1="100" y1="30" x2="72" y2="46" stroke="#fff" stroke-width="1.5"/>
    <line x1="100" y1="30" x2="128" y2="46" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- "R" letter - clean geometric -->
  <path d="
    M 38 56
    L 38 160
    L 58 160
    L 58 116
    L 68 116
    L 92 160
    L 116 160
    L 88 112
    C 104 108 114 94 114 80
    C 114 64 100 56 82 56
    Z
    M 58 74
    L 78 74
    C 88 74 94 78 94 86
    C 94 94 88 98 78 98
    L 58 98
    Z
  " fill="#ffffff"/>

  <!-- Bowtie join symbol between R and a -->
  <g>
    <polygon points="118,62 142,78 118,94" fill="url(#acc)" opacity="0.85"/>
    <polygon points="166,62 142,78 166,94" fill="url(#acc)" opacity="0.85"/>
  </g>

  <!-- "a" letter - lowercase, rounded -->
  <path d="
    M 148 120
    C 134 120 124 130 124 142
    C 124 154 134 164 148 164
    C 154 164 158 162 162 158
    L 162 164
    L 178 164
    L 178 120
    L 162 120
    L 162 126
    C 158 122 154 120 148 120
    Z
    M 150 134
    C 156 134 162 138 162 144
    C 162 150 156 154 150 154
    C 144 154 140 150 140 144
    C 140 138 144 134 150 134
    Z
  " fill="#ffffff" opacity="0.93"/>
</svg>