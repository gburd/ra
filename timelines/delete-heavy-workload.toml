# Delete-heavy workload with dead tuple accumulation
#
# Models a workload where frequent deletes create dead tuples that
# affect statistics accuracy and query performance. Shows the
# interaction between DELETE, VACUUM, ANALYZE, and optimizer behavior.

[metadata]
name = "delete-heavy-workload"
description = "Delete-heavy workload with dead tuple accumulation and vacuum cycles"
database = "postgresql"
schema = "messaging"
duration_seconds = 3600

# -- Snapshot 0: Full table, no dead tuples --
[[snapshots]]
time_offset = 0
label = "clean state"

[[snapshots.tables]]
name = "messages"
row_count = 5000000
page_count = 50000
avg_row_size = 80.0
table_size_bytes = 400_000_000

[[snapshots.tables.columns]]
name = "message_id"
ndv = 5000000
null_fraction = 0.0
avg_width = 8.0
correlation = 0.99

[[snapshots.tables.columns]]
