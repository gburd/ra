# -- Events --

[[events]]
time_offset = 300
kind = "delete"
table = "messages"
row_count = 1500000
description = "Purge messages older than 90 days"

[[events]]
time_offset = 700
kind = "analyze"
table = "messages"
description = "ANALYZE after mass delete"

[[events]]
time_offset = 1200
kind = "vacuum"
table = "messages"
description = "VACUUM FULL reclaims dead tuple space"

[[events]]
time_offset = 1800
kind = "analyze"
table = "messages"
description = "Post-VACUUM ANALYZE"

[[events]]
time_offset = 2400
kind = "insert"
table = "messages"
row_count = 500000
description = "New messages flowing in"

[[events]]
time_offset = 3300
kind = "analyze"
table = "messages"
description = "Regular ANALYZE cycle"

# -- Feedback showing dead tuple impact on scans --

[[feedback]]
time_offset = 100
query = "SELECT u.username, count(*) FROM messages m JOIN users u ON m.sender_id = u.user_id WHERE m.is_read = false GROUP BY u.username ORDER BY count(*) DESC LIMIT 10"
operator = "SeqScan on messages"
estimated_rows = 2500000.0
actual_rows = 2500000.0
estimated_cost = 100000.0
actual_time_ms = 1800.0

