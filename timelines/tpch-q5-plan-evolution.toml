[metadata]
name = "tpch-q5-plan-evolution"
description = "TPC-H Q5 showing plan changes due to statistics drift and feedback"
database = "postgresql"
schema = "TPC-H"
scale_factor = 1.0
duration_seconds = 14400  # 4 hours

# Q5: Revenue by region with multi-way join
# SELECT n_name, SUM(l_extendedprice * (1 - l_discount)) as revenue
# FROM customer, orders, lineitem, supplier, nation, region
# WHERE c_custkey = o_custkey AND l_orderkey = o_orderkey
#   AND l_suppkey = s_suppkey AND c_nationkey = s_nationkey
#   AND s_nationkey = n_nationkey AND n_regionkey = r_regionkey
#   AND r_name = 'ASIA' AND o_orderdate >= '1994-01-01' AND o_orderdate < '1995-01-01'
# GROUP BY n_name

# Initial state: Fresh statistics, optimal hash join order
[[timeline]]
offset_seconds = 0
event = "initial"
description = "Fresh ANALYZE - optimal plan with hash joins"

[timeline.tables.customer]
row_count = 150_000
page_count = 3_000
avg_row_size = 200
modifications_since_analyze = 0
staleness_level = "Fresh"

[timeline.tables.orders]
row_count = 1_500_000
page_count = 30_000
avg_row_size = 150
modifications_since_analyze = 0
staleness_level = "Fresh"

[timeline.tables.lineitem]
row_count = 6_000_000
page_count = 90_000
avg_row_size = 128
modifications_since_analyze = 0
staleness_level = "Fresh"

[timeline.tables.supplier]
row_count = 10_000
page_count = 200
avg_row_size = 180
modifications_since_analyze = 0
staleness_level = "Fresh"

[timeline.tables.nation]
row_count = 25
page_count = 1
avg_row_size = 100
modifications_since_analyze = 0
staleness_level = "Fresh"

[timeline.tables.region]
row_count = 5
page_count = 1
avg_row_size = 100
modifications_since_analyze = 0
staleness_level = "Fresh"

# Columns for selectivity
[timeline.columns."region.r_name"]
ndv = 5
null_fraction = 0.0
most_common_values = [["ASIA", 0.2], ["AMERICA", 0.2], ["EUROPE", 0.2], ["MIDDLE EAST", 0.2], ["AFRICA", 0.2]]

[timeline.columns."orders.o_orderdate"]
ndv = 2406
null_fraction = 0.0
correlation = 0.92  # High correlation with physical order

[timeline.events]
[[timeline.events.entries]]
time_offset = 0
kind = "Analyze"
tables = ["customer", "orders", "lineitem", "supplier", "nation", "region"]
description = "Initial ANALYZE on all tables"

# 30 minutes: Small inserts start
[[timeline]]
offset_seconds = 1800
event = "small_inserts_start"
description = "Trickle inserts to orders/lineitem - statistics still fresh"

[timeline.tables.orders]
row_count = 1_510_000  # +10K orders
modifications_since_analyze = 10_000
staleness_level = "Fresh"  # <1% change

[timeline.tables.lineitem]
row_count = 6_040_000  # +40K line items (avg 4 per order)
modifications_since_analyze = 40_000
staleness_level = "Fresh"

[timeline.events]
[[timeline.events.entries]]
time_offset = 1800
kind = "Insert"
table = "orders"
rows = 10_000
description = "Small continuous inserts"

# 1 hour: Moderate inserts - statistics becoming stale
[[timeline]]
offset_seconds = 3600
event = "moderate_inserts"
description = "Statistics slightly stale (1.7% change) - plan still optimal"

[timeline.tables.orders]
row_count = 1_525_000  # +25K total
modifications_since_analyze = 25_000
staleness_level = "SlightlyStale"  # 1.7%

[timeline.tables.lineitem]
row_count = 6_100_000  # +100K total
modifications_since_analyze = 100_000
staleness_level = "SlightlyStale"  # 1.7%

# Execute Q5 and get feedback
[[timeline.feedback]]
time_offset = 3700
query_id = "tpch-q5"
operator = "join:orders_lineitem"
estimated_rows = 6_000_000
actual_rows = 6_100_000
q_error = 1.017
confidence_adjustment = 0.98

# 2 hours: Bulk load starts - major staleness
[[timeline]]
offset_seconds = 7200
event = "bulk_load_start"
description = "Large bulk insert - statistics very stale, plan suboptimal"

[timeline.tables.orders]
row_count = 1_800_000  # +300K orders (20% increase!)
modifications_since_analyze = 300_000
staleness_level = "ModeratelyStale"  # 20%

[timeline.tables.lineitem]
row_count = 7_200_000  # +1.2M line items
modifications_since_analyze = 1_200_000
staleness_level = "ModeratelyStale"  # 20%

[timeline.events]
[[timeline.events.entries]]
time_offset = 7200
kind = "Insert"
table = "orders"
rows = 275_000
description = "Bulk load of historical orders"

# Execute Q5 again - significant estimation error
[[timeline.feedback]]
time_offset = 7300
query_id = "tpch-q5"
operator = "join:orders_lineitem"
estimated_rows = 6_000_000  # Still using old stats!
actual_rows = 7_200_000     # 20% error
q_error = 1.20
confidence_adjustment = 0.75  # Reduce confidence significantly

[[timeline.feedback]]
time_offset = 7300
query_id = "tpch-q5"
operator = "join:customer_orders"
estimated_rows = 1_500_000
actual_rows = 1_800_000
q_error = 1.20
confidence_adjustment = 0.75

# 2.5 hours: Auto-analyze triggers
[[timeline]]
offset_seconds = 9000
event = "auto_analyze"
description = "Autovacuum triggers ANALYZE - statistics refreshed"

[timeline.tables.orders]
row_count = 1_800_000
modifications_since_analyze = 0  # Reset
staleness_level = "Fresh"
last_analyzed = 9000

[timeline.tables.lineitem]
row_count = 7_200_000
modifications_since_analyze = 0  # Reset
staleness_level = "Fresh"
last_analyzed = 9000

# Updated column statistics
[timeline.columns."orders.o_orderdate"]
ndv = 2506  # More distinct dates
null_fraction = 0.0
correlation = 0.88  # Slightly lower correlation after bulk load

[timeline.events]
[[timeline.events.entries]]
time_offset = 9000
kind = "Analyze"
tables = ["orders", "lineitem"]
description = "Autovacuum ANALYZE after threshold"

# Execute Q5 with fresh stats - better estimates
[[timeline.feedback]]
time_offset = 9100
query_id = "tpch-q5"
operator = "join:orders_lineitem"
estimated_rows = 7_150_000  # Much better!
actual_rows = 7_200_000
q_error = 1.007
confidence_adjustment = 0.95

# 3 hours: Delete workload starts (data skew)
[[timeline]]
offset_seconds = 10800
event = "delete_old_orders"
description = "Delete old orders - creates data skew, stats becoming stale again"

[timeline.tables.orders]
row_count = 1_700_000  # -100K deleted
modifications_since_analyze = 100_000
staleness_level = "SlightlyStale"  # 5.6%

[timeline.tables.lineitem]
row_count = 6_800_000  # -400K deleted
modifications_since_analyze = 400_000
staleness_level = "SlightlyStale"  # 5.6%

[timeline.events]
[[timeline.events.entries]]
time_offset = 10800
kind = "Delete"
table = "orders"
rows = 100_000
description = "Purge orders older than 5 years"

# Skewed date distribution after deletes
[timeline.columns."orders.o_orderdate"]
ndv = 2506
null_fraction = 0.0
correlation = 0.75  # Much lower - physical order != date order after deletes

# 4 hours: End state
[[timeline]]
offset_seconds = 14400
event = "end"
description = "Final state - statistics moderately stale, plan adapting"

[timeline.tables.orders]
row_count = 1_700_000
modifications_since_analyze = 100_000
staleness_level = "SlightlyStale"

[timeline.tables.lineitem]
row_count = 6_800_000
modifications_since_analyze = 400_000
staleness_level = "SlightlyStale"

# Execute Q5 final time
[[timeline.feedback]]
time_offset = 14400
query_id = "tpch-q5"
operator = "join:orders_lineitem"
estimated_rows = 7_200_000  # Using stale stats
actual_rows = 6_800_000     # Underestimate
q_error = 1.059
confidence_adjustment = 0.90
