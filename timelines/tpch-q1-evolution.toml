# TPC-H Q1 lineitem statistics evolution
#
# Demonstrates how statistics for the lineitem table evolve during a
# realistic workload: initial load, batch inserts, stale statistics
# causing estimation errors, ANALYZE refresh, and improved estimates.

[metadata]
name = "tpch-q1-evolution"
description = "TPC-H Q1 lineitem statistics evolution over batch inserts and ANALYZE"
database = "postgresql"
schema = "TPC-H"
scale_factor = 1.0
duration_seconds = 7200

# -- Snapshot 0: Initial load (SF=1) --
[[snapshots]]
time_offset = 0
