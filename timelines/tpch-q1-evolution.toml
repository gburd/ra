# -- Execution feedback --

[[feedback]]
time_offset = 300
query = "SELECT l_returnflag, l_linestatus, sum(l_quantity), sum(l_extendedprice) FROM lineitem WHERE l_shipdate <= date '1998-09-02' GROUP BY l_returnflag, l_linestatus ORDER BY l_returnflag, l_linestatus"
operator = "SeqScan on lineitem"
estimated_rows = 5916591.0
actual_rows = 5916591.0
estimated_cost = 160043.0
actual_time_ms = 1850.0

