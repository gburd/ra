# -- Events --

[[events]]
time_offset = 100
kind = "insert"
table = "inventory"
row_count = 200000
description = "New inventory batch"

[[events]]
time_offset = 100
kind = "insert"
table = "shipments"
row_count = 100000
description = "Shipment records"

[[events]]
time_offset = 400
kind = "analyze"
table = "inventory"
description = "ANALYZE triggered by Q-error > 2.0 feedback"

[[events]]
time_offset = 400
kind = "analyze"
table = "shipments"
description = "ANALYZE triggered by Q-error > 2.0 feedback"

[[events]]
time_offset = 600
kind = "reoptimize"
table = "inventory"
description = "Join plan refreshed after ANALYZE"

[[events]]
time_offset = 900
kind = "insert"
table = "inventory"
row_count = 200000
description = "Second inventory batch"

[[events]]
