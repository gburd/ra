# ANALYZE triggered by feedback loop
#
# Demonstrates a feedback-driven statistics refresh cycle where
# execution feedback (bad Q-error) triggers ANALYZE, which updates
# statistics and improves subsequent estimates. Shows the adaptive
# optimization loop in action.

[metadata]
name = "analyze-feedback-loop"
description = "Feedback-driven ANALYZE cycle improving estimation accuracy"
database = "postgresql"
schema = "warehouse"
duration_seconds = 1800

