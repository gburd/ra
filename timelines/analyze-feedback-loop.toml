# -- Feedback loop: bad estimates -> ANALYZE -> improved estimates --

[[feedback]]
time_offset = 200
query = "SELECT i.item_id, sum(s.quantity) FROM inventory i JOIN shipments s ON i.item_id = s.item_id WHERE i.warehouse_id = 12 GROUP BY i.item_id"
operator = "HashJoin (inventory x shipments)"
estimated_rows = 40000.0
actual_rows = 52000.0
estimated_cost = 30000.0
actual_time_ms = 450.0

