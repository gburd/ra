# -- Execution feedback --

[[feedback]]
time_offset = 200
query = "SELECT endpoint, avg(response_time_ms) FROM http_requests WHERE status_code = 500 AND created_at > now() - interval '1 hour' GROUP BY endpoint"
operator = "IndexScan on http_requests_created_at_idx"
estimated_rows = 250.0
actual_rows = 250.0
estimated_cost = 120.0
actual_time_ms = 8.0

