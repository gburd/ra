# IndexScan vs SeqScan transitions
#
# Demonstrates how table growth and selectivity changes cause the
# optimizer to switch between IndexScan and SeqScan strategies.
#
# Scenario: A web analytics table with a B-tree index on `status`.
# Initially the table is small and the WHERE status = 'error' filter
# is highly selective, so IndexScan wins. As the table grows and the
# error rate increases, SeqScan becomes cheaper. After a VACUUM and
# a selectivity-restoring DELETE, IndexScan returns.
#
# Query:
#   SELECT request_id, url, timestamp, response_time
#   FROM http_requests
#   WHERE status = 'error'
#   ORDER BY timestamp DESC
#   LIMIT 100

[metadata]
name = "index-vs-seqscan"
description = "IndexScan vs SeqScan transitions driven by table growth and selectivity"
database = "postgresql"
schema = "web_analytics"
duration_seconds = 7200  # 2 hours

