# Index vs sequential scan crossover
#
# Demonstrates the crossover point between index scan and sequential
# scan as table size grows. With high selectivity the optimizer
# prefers an index scan; as more data arrives and selectivity drops,
# it switches to sequential scan. After ANALYZE, estimates recover.

[metadata]
name = "index-vs-seqscan"
description = "Index scan to sequential scan crossover as selectivity decreases"
database = "postgresql"
schema = "monitoring"
scale_factor = 1.0
duration_seconds = 7200

# -- Snapshot 0: Small table, high selectivity --
[[snapshots]]
time_offset = 0
label = "initial"

[[snapshots.tables]]
name = "http_requests"
row_count = 500_000
page_count = 6_000
avg_row_size = 96.0
table_size_bytes = 48_000_000

