# -- Feedback showing increasing staleness --

[[feedback]]
time_offset = 60
query = "SELECT event_type, count(*) FROM events WHERE timestamp > :cutoff GROUP BY event_type"
operator = "HashAggregate"
estimated_rows = 25.0
actual_rows = 25.0

[[feedback]]
time_offset = 180
query = "SELECT event_type, count(*) FROM events WHERE timestamp > :cutoff GROUP BY event_type"
operator = "SeqScan on events"
estimated_rows = 1000000.0
actual_rows = 1200000.0

[[feedback]]
time_offset = 360
query = "SELECT user_id, count(*) FROM events WHERE event_type = 'purchase' GROUP BY user_id HAVING count(*) > 5"
operator = "SeqScan on events"
estimated_rows = 1000000.0
actual_rows = 1500000.0
estimated_cost = 25000.0
actual_time_ms = 380.0

[[feedback]]
