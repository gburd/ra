# Streaming inserts workload
#
# Models a streaming ingest scenario where rows are continuously
# appended to an events table. Statistics grow stale rapidly and
# the optimizer must cope with outdated cardinality estimates.

[metadata]
name = "streaming-inserts"
description = "Continuous streaming insert workload with growing table"
database = "duckdb"
schema = "events"
duration_seconds = 600

# -- Snapshot 0: Start of window --
[[snapshots]]
time_offset = 0
label = "window start"

[[snapshots.tables]]
name = "events"
row_count = 1000000
page_count = 12500
