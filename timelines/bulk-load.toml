# -- Events --

[[events]]
time_offset = 300
kind = "insert"
table = "inventory"
row_count = 5000000
description = "Initial bulk load of 5M inventory records"

[[events]]
time_offset = 900
kind = "insert"
table = "inventory"
row_count = 7000000
description = "Second bulk load from new warehouses"

[[events]]
time_offset = 1500
kind = "analyze"
table = "inventory"
description = "Auto-ANALYZE triggered by row count change"

[[events]]
time_offset = 1800
kind = "reoptimize"
table = "inventory"
description = "Query plans refreshed"

[[events]]
time_offset = 2100
kind = "insert"
table = "inventory"
row_count = 6000000
description = "Third bulk load"

[[events]]
time_offset = 3000
kind = "vacuum"
table = "inventory"
description = "VACUUM reclaiming dead tuples"

[[events]]
time_offset = 3300
kind = "analyze"
table = "inventory"
description = "Manual ANALYZE after vacuum"

