# Bulk load with staleness propagation
#
# Demonstrates how a large bulk insert makes statistics stale,
# causing estimation errors that propagate through the optimizer
# until ANALYZE refreshes the statistics.

[metadata]
name = "bulk-load"
description = "Bulk insert with staleness propagation and recovery"
database = "postgresql"
schema = "warehouse"
scale_factor = 1.0
duration_seconds = 3600

# -- Snapshot 0: Empty warehouse --
[[snapshots]]
time_offset = 0
label = "empty warehouse"

[[snapshots.tables]]
name = "inventory"
row_count = 0
page_count = 0
avg_row_size = 64.0
table_size_bytes = 0

[[snapshots.tables.columns]]
name = "item_id"
ndv = 0
null_fraction = 0.0
avg_width = 8.0

[[snapshots.tables.columns]]
name = "warehouse_id"
ndv = 0
null_fraction = 0.0
avg_width = 4.0

[[snapshots.tables.columns]]
name = "quantity"
ndv = 0
null_fraction = 0.0
avg_width = 4.0

# -- Snapshot 1: After initial bulk load --
[[snapshots]]
time_offset = 600
label = "after initial bulk load"

[[snapshots.tables]]
name = "inventory"
row_count = 5000000
page_count = 40000
avg_row_size = 64.0
table_size_bytes = 320000000

[[snapshots.tables.columns]]
