ndv = 500000
null_fraction = 0.0
avg_width = 8.0
correlation = 0.95

[[snapshots.tables.columns]]
name = "warehouse_id"
ndv = 100
null_fraction = 0.0
avg_width = 4.0

[[snapshots.tables.columns]]
name = "quantity"
ndv = 1000
null_fraction = 0.0
avg_width = 4.0
min_value = "0"
max_value = "9999"

