# Partition pruning effectiveness degradation
#
# Demonstrates how partition pruning becomes less effective as
# statistics become stale and partition sizes grow unevenly.
#
# Scenario: A time-partitioned event log with monthly partitions.
# A query filters by date range. Initially, pruning eliminates most
# partitions effectively. As data skews toward recent months and
# stats become stale, the optimizer scans too many partitions.
# ANALYZE restores accurate partition statistics and pruning recovers.
#
# Query:
#   SELECT event_type, COUNT(*), AVG(duration_ms)
#   FROM event_log
#   WHERE event_time >= '2025-10-01' AND event_time < '2025-11-01'
#     AND user_id IS NOT NULL
#   GROUP BY event_type

[metadata]
name = "partition-pruning-effectiveness"
description = "Partition pruning degradation from stale stats and skewed partition sizes"
database = "postgresql"
schema = "analytics"
duration_seconds = 14400  # 4 hours

