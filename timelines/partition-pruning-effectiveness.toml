# Partition pruning effectiveness
#
# Demonstrates how partition pruning efficiency varies as partitions
# are added, split, and statistics go stale. A monthly-partitioned
# event log table gains weekly sub-partitions via schema change,
# causing a stale period until ANALYZE refreshes stats.

[metadata]
name = "partition-pruning-effectiveness"
description = "Partition pruning across schema changes and stale statistics"
database = "postgresql"
schema = "analytics"
scale_factor = 1.0
duration_seconds = 7200

