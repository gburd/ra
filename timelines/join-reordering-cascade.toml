# Multi-table join with cascading reorder
#
# Demonstrates how growth in a single table can cascade through
# a multi-way join plan, causing the optimizer to reorder joins.
#
# Scenario: E-commerce analytics query joining 5 tables in a star schema.
# Initially, the small `promotions` table is joined first as a filter.
# As the promotions table grows from a seasonal campaign, the optimal
# join order shifts: the optimizer switches from promotions-first to
# products-first, then eventually to a bushy join tree.
#
# Query:
#   SELECT p.category, pr.campaign, s.region, SUM(f.revenue)
#   FROM fact_transactions f
#   JOIN dim_products p ON f.product_id = p.product_id
#   JOIN dim_stores s ON f.store_id = s.store_id
#   JOIN dim_customers c ON f.customer_id = c.customer_id
#   JOIN promotions pr ON f.promo_id = pr.promo_id
#   WHERE pr.active = true AND s.region = 'WEST'
#   GROUP BY p.category, pr.campaign, s.region

[metadata]
name = "join-reordering-cascade"
description = "Multi-table join showing cascading reorder as promotions table grows"
database = "postgresql"
schema = "ecommerce"
scale_factor = 10.0
duration_seconds = 21600  # 6 hours

