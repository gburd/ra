# Join reordering cascade
#
# Demonstrates how join order changes as table sizes evolve.
# A 5-table star-schema join reorders as the promotions
# dimension table explodes during a flash sale and then
# contracts after cleanup, triggering cascading replans.

[metadata]
name = "join-reordering-cascade"
description = "Join order changes driven by promotions lifecycle in a star schema"
database = "postgresql"
schema = "retail_star"
scale_factor = 1.0
duration_seconds = 9000

