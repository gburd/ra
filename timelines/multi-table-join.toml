# Multi-table join statistics evolution
#
# Tracks how statistics for a star schema evolve as the fact table
# grows and dimension tables are occasionally updated. Shows how
# join cardinality estimates degrade with stale dimension stats.

[metadata]
name = "multi-table-join"
description = "Star schema join statistics evolution over growing fact table"
database = "duckdb"
schema = "analytics"
scale_factor = 10.0
duration_seconds = 7200

