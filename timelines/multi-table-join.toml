# -- Feedback: 3-way star join --

[[feedback]]
time_offset = 600
query = "SELECT p.category, s.region, sum(f.amount) FROM fact_sales f JOIN dim_product p ON f.product_id = p.product_id JOIN dim_store s ON f.store_id = s.store_id WHERE f.sale_date >= '2024-01-01' GROUP BY p.category, s.region"
operator = "HashJoin (fact x product)"
estimated_rows = 3333333.0
actual_rows = 3300000.0
estimated_cost = 250000.0
actual_time_ms = 4500.0

