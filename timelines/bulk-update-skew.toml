# -- Events --

[[events]]
time_offset = 600
kind = "update"
table = "orders"
row_count = 2000000
description = "Bulk UPDATE setting 40% of orders to 'archived' status"

[[events]]
time_offset = 1200
kind = "analyze"
table = "orders"
description = "Auto-ANALYZE triggered by 2M modifications"

[[events]]
time_offset = 1800
kind = "reoptimize"
table = "orders"
description = "Join query plan refreshed"

[[events]]
time_offset = 2400
kind = "vacuum"
table = "orders"
description = "VACUUM reclaims dead tuples from bulk update"

# -- Feedback: Skew causes bad join estimates --

[[feedback]]
time_offset = 100
query = "SELECT c.region, count(*) FROM orders o JOIN customers c ON o.customer_id = c.customer_id WHERE o.status = 'pending' GROUP BY c.region"
operator = "HashJoin"
estimated_rows = 833333.0
actual_rows = 830000.0
estimated_cost = 125000.0
actual_time_ms = 3200.0

