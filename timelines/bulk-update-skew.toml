# Bulk update causing data skew
#
# Models a scenario where a bulk UPDATE changes the value distribution
# of a column, creating skew that invalidates histogram-based estimates.
# The optimizer initially uses stale histograms leading to bad join
# order decisions until ANALYZE refreshes statistics.

[metadata]
name = "bulk-update-skew"
description = "Bulk UPDATE creating data skew that invalidates histogram estimates"
database = "postgresql"
schema = "ecommerce"
duration_seconds = 3600

# -- Snapshot 0: Uniform distribution --
[[snapshots]]
time_offset = 0
label = "uniform distribution"

[[snapshots.tables]]
name = "orders"
row_count = 5000000
page_count = 62500
avg_row_size = 96.0
table_size_bytes = 480_000_000

