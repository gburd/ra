# -- Execution feedback --

[[feedback]]
time_offset = 300
query = "SELECT device_id, avg(temperature), count(*) FROM sensor_readings WHERE recorded_at > now() - interval '1 day' GROUP BY device_id"
operator = "HashAggregate"
estimated_rows = 1_000.0
actual_rows = 1_000.0
estimated_cost = 25_000.0
actual_time_ms = 450.0

