# Aggregation strategy evolution
#
# Demonstrates aggregation strategy transitions as the number of
# groups (devices) grows from 1K to 100K+. Initially hash aggregation
# is optimal; as cardinality explodes the optimizer switches to
# sort-based group aggregation. After an archive purge shrinks the
# readings table, the strategy shifts back.

[metadata]
name = "aggregation-strategy-evolution"
description = "Aggregation strategy changes driven by device cardinality growth"
database = "postgresql"
schema = "iot"
scale_factor = 1.0
duration_seconds = 10800

