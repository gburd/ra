# Aggregation strategy evolution: HashAgg vs GroupAgg
#
# Demonstrates how data volume and group count drive transitions
# between hash-based and sort-based aggregation strategies.
#
# Scenario: An IoT sensor platform with a GROUP BY query on device_id.
# Initially, the number of groups fits in work_mem and HashAgg is used.
# As new devices are onboarded, the group count exceeds work_mem and
# the optimizer switches to GroupAgg (sort-based). A work_mem increase
# brings HashAgg back. Finally, a partitioned aggregation (2-phase)
# strategy emerges for the largest data volumes.
#
# Query:
#   SELECT device_id, date_trunc('hour', reading_time) as hour,
#          AVG(temperature), MAX(humidity), COUNT(*)
#   FROM sensor_readings
#   WHERE reading_time >= NOW() - INTERVAL '24 hours'
#   GROUP BY device_id, date_trunc('hour', reading_time)

[metadata]
name = "aggregation-strategy-evolution"
description = "HashAgg vs GroupAgg transitions driven by group count and work_mem"
database = "postgresql"
schema = "iot_platform"
duration_seconds = 10800  # 3 hours

