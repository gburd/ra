# Mixed read/write workload
#
# Demonstrates concurrent read/write patterns where inserts, updates,
# and deletes all affect statistics accuracy. Shows how different
# tables evolve at different rates under a mixed workload.

[metadata]
name = "mixed-workload"
description = "Concurrent read/write patterns affecting multiple tables"
database = "postgresql"
schema = "ecommerce"
duration_seconds = 7200

