# -- Execution feedback --

[[feedback]]
time_offset = 200
query = "SELECT u.email, count(o.order_id) FROM users u JOIN orders o ON u.user_id = o.user_id GROUP BY u.email"
operator = "Hash Join on orders"
estimated_rows = 500000.0
actual_rows = 500000.0
estimated_cost = 25000.0
actual_time_ms = 850.0

