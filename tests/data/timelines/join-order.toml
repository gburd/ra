# Events
[[events]]
time_offset = 0
kind = "baseline"
description = "Initial state: orders (50K rows) << customers (500K rows)"

[[events]]
time_offset = 1800
kind = "data_modification"
table = "orders"
description = "Business growth: 200K new orders"

[[events]]
time_offset = 3600
kind = "statistics_update"
table = "orders"
description = "ANALYZE orders"

[[events]]
time_offset = 5400
kind = "data_modification"
table = "orders"
description = "Continued growth: 750K more orders"

[[events]]
time_offset = 7200
kind = "statistics_update"
description = "ANALYZE all tables"

# Test Expectations
[[expectations]]
snapshot_index = 0
expected_plan_pattern = ".*HashJoin.*orders.*customers.*"
rules_applied_must_include = ["hash-join-introduction"]
invalidation_trigger = "None"

[[expectations]]
snapshot_index = 1
expected_plan_pattern = ".*HashJoin.*orders.*customers.*"
rules_applied_must_include = ["hash-join-introduction"]
invalidation_trigger = "Statistics"

[[expectations]]
snapshot_index = 2
expected_plan_pattern = ".*HashJoin.*customers.*orders.*"
rules_applied_must_include = ["hash-join-introduction", "join-order-reoptimization"]
invalidation_trigger = "Statistics"
