# Timeline Configuration: Hardware Upgrade Enables Parallelism
# Demonstrates how migrating from laptop to server enables parallel execution strategies

[metadata]
name = "Hardware Upgrade Scenario"
description = "Migration from laptop (4 cores) to server (64 cores) enables parallel query execution"
query = "SELECT l_returnflag, l_linestatus, SUM(l_quantity) FROM lineitem WHERE l_shipdate <= '1998-12-01' GROUP BY l_returnflag, l_linestatus"
dialect = "postgresql"
duration_seconds = 7200
schema = "TPC-H"

# Hardware Profiles
[[hardware_profiles]]
name = "laptop"
cpu_cores = 4
total_memory = 16_000_000_000
available_memory = 12_000_000_000
simd_width = 256
has_gpu = false
l1_cache_size = 32768
l2_cache_size = 262144
l3_cache_size = 8388608

[[hardware_profiles]]
name = "workstation"
cpu_cores = 16
total_memory = 64_000_000_000
available_memory = 48_000_000_000
simd_width = 512
has_gpu = false
l1_cache_size = 32768
l2_cache_size = 262144
l3_cache_size = 33554432

[[hardware_profiles]]
name = "server"
cpu_cores = 64
total_memory = 512_000_000_000
available_memory = 400_000_000_000
simd_width = 512
has_gpu = true
gpu_memory = 80_000_000_000
l1_cache_size = 32768
l2_cache_size = 262144
l3_cache_size = 67108864

# Snapshot 1: Development laptop - serial execution
[[snapshots]]
time_offset = 0
label = "Development laptop - serial scan and aggregate"
hardware_profile = "laptop"

  [snapshots.schema]

    [[snapshots.schema.tables]]
    name = "lineitem"
    storage_format = "row_based"
    primary_key = ["l_orderkey", "l_linenumber"]

      [[snapshots.schema.tables.columns]]
      name = "l_orderkey"
      data_type = "integer"
      nullable = false

      [[snapshots.schema.tables.columns]]
      name = "l_linenumber"
      data_type = "integer"
      nullable = false

      [[snapshots.schema.tables.columns]]
      name = "l_shipdate"
      data_type = "date"
      nullable = false

      [[snapshots.schema.tables.columns]]
      name = "l_returnflag"
      data_type = "string"
      nullable = false

      [[snapshots.schema.tables.columns]]
      name = "l_linestatus"
      data_type = "string"
      nullable = false

      [[snapshots.schema.tables.columns]]
      name = "l_quantity"
      data_type = "decimal"
      nullable = false

    [[snapshots.schema.tables.indexes]]
    name = "idx_lineitem_shipdate"
    index_type = "btree"
    columns = ["l_shipdate"]
    is_unique = false

  [[snapshots.statistics.tables]]
  name = "lineitem"
  row_count = 6_001_215
  page_count = 60_012
  avg_row_size = 100.0
  table_size_bytes = 600_121_500

    [[snapshots.statistics.tables.columns]]
    name = "l_shipdate"
    ndv = 2526
    null_fraction = 0.0
    avg_width = 4.0
    correlation = 0.95
    min_value = "1992-01-02"
    max_value = "1998-12-01"

    [[snapshots.statistics.tables.columns]]
    name = "l_returnflag"
    ndv = 3
    null_fraction = 0.0
    avg_width = 1.0
    min_value = "A"
    max_value = "R"

    [[snapshots.statistics.tables.columns]]
    name = "l_linestatus"
    ndv = 2
    null_fraction = 0.0
    avg_width = 1.0
    min_value = "F"
    max_value = "O"

    [[snapshots.statistics.tables.columns]]
    name = "l_quantity"
    ndv = 50
    null_fraction = 0.0
    avg_width = 8.0
    min_value = "1.0"
    max_value = "50.0"

  [snapshots.facts]
  supports_hash_join = true
  supports_parallel_scan = false  # Too few cores for effective parallelism
  parallel_workers = 0  # No parallel workers on laptop
  work_mem_bytes = 67108864  # 64MB
  effective_cache_size_bytes = 4_000_000_000  # 4GB

