# Test Expectations
[[expectations]]
snapshot_index = 0
expected_plan_pattern = ".*SeqScan.*Aggregate.*"
expected_cost_range = [600000.0, 800000.0]
rules_applied_must_not_include = ["parallel-scan-introduction", "parallel-aggregate"]
invalidation_trigger = "None"

[[expectations]]
snapshot_index = 1
expected_plan_pattern = ".*(Parallel|Gather).*"
rules_applied_must_include = ["parallel-scan-introduction"]
invalidation_trigger = "Hardware"

[[expectations]]
