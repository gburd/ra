# Events
[[events]]
time_offset = 1800
kind = "schema_change"
table = "orders"
description = "BEGIN: CREATE INDEX idx_orders_customer ON orders(customer_id)"

[[events]]
time_offset = 3600
kind = "schema_change"
table = "orders"
description = "COMMIT: Index idx_orders_customer created"

[[events]]
time_offset = 5400
kind = "schema_change"
table = "orders"
description = "BEGIN: CREATE INDEX idx_orders_customer_status ON orders(customer_id, status)"

[[events]]
time_offset = 7200
kind = "schema_change"
table = "orders"
description = "COMMIT: Index idx_orders_customer_status created"

[[events]]
time_offset = 9000
kind = "schema_change"
table = "orders"
description = "BEGIN: CREATE INDEX idx_orders_customer_status_covering ON orders(customer_id, status) INCLUDE (order_date, total_amount)"

[[events]]
time_offset = 10800
kind = "schema_change"
table = "orders"
description = "COMMIT: Covering index created"

# Test Expectations
[[expectations]]
snapshot_index = 0
expected_plan_pattern = ".*SeqScan.*orders.*"
expected_cost_range = [500000.0, 700000.0]
rules_applied_must_not_include = ["index-scan-selection"]
invalidation_trigger = "None"

[[expectations]]
snapshot_index = 1
expected_plan_pattern = ".*IndexScan.*idx_orders_customer.*"
expected_cost_range = [1000.0, 3000.0]
rules_applied_must_include = ["index-scan-selection"]
invalidation_trigger = "Index"

[[expectations]]
snapshot_index = 2
expected_plan_pattern = ".*IndexScan.*idx_orders_customer_status.*"
expected_cost_range = [100.0, 500.0]
rules_applied_must_include = ["index-scan-selection"]
invalidation_trigger = "Index"

[[expectations]]
snapshot_index = 3
expected_plan_pattern = ".*IndexOnlyScan.*idx_orders_customer_status_covering.*"
expected_cost_range = [20.0, 200.0]
rules_applied_must_include = ["index-only-scan"]
invalidation_trigger = "Index"
