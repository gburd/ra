# Timeline Configuration: TPC-H Q1 Evolution with Realistic Data Growth
# TPC-H Q1: Pricing Summary Report Query

[metadata]
name = "TPC-H Q1 Evolution"
description = "TPC-H Q1 (Pricing Summary) evolves from SF=0.1 → SF=1 → SF=10 with schema optimizations"
query = """
SELECT
    l_returnflag,
    l_linestatus,
    SUM(l_quantity) AS sum_qty,
    SUM(l_extendedprice) AS sum_base_price,
    SUM(l_extendedprice * (1 - l_discount)) AS sum_disc_price,
    SUM(l_extendedprice * (1 - l_discount) * (1 + l_tax)) AS sum_charge,
    AVG(l_quantity) AS avg_qty,
    AVG(l_extendedprice) AS avg_price,
    AVG(l_discount) AS avg_disc,
    COUNT(*) AS count_order
FROM
    lineitem
WHERE
    l_shipdate <= DATE '1998-12-01' - INTERVAL '90' DAY
GROUP BY
    l_returnflag,
    l_linestatus
ORDER BY
    l_returnflag,
    l_linestatus
"""
dialect = "postgresql"
duration_seconds = 21600
schema = "TPC-H"

# Hardware Profiles
[[hardware_profiles]]
name = "dev"
cpu_cores = 4
total_memory = 16_000_000_000
available_memory = 12_000_000_000
simd_width = 256
has_gpu = false

[[hardware_profiles]]
name = "production"
cpu_cores = 32
total_memory = 128_000_000_000
available_memory = 100_000_000_000
simd_width = 512
has_gpu = false

