description = "FK indexes creation completed"

[[events]]
time_offset = 9000
kind = "hardware_change"
description = "Migrated to production hardware (64 cores, 256GB RAM)"

# Test Expectations
[[expectations]]
snapshot_index = 0
expected_plan_pattern = ".*(NestedLoop|SeqScan).*"
rules_applied_must_not_include = ["hash-join-introduction"]
invalidation_trigger = "None"

[[expectations]]
snapshot_index = 1
expected_plan_pattern = ".*HashJoin.*"
rules_applied_must_include = ["hash-join-introduction", "index-scan-selection"]
invalidation_trigger = "Index"

[[expectations]]
snapshot_index = 2
expected_plan_pattern = ".*(ParallelHash|Gather).*"
rules_applied_must_include = ["parallel-hash-join"]
invalidation_trigger = "Hardware"
