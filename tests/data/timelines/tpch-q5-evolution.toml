# Timeline Configuration: TPC-H Q5 Evolution with Join Optimization
# TPC-H Q5: Local Supplier Volume Query (5-way join)

[metadata]
name = "TPC-H Q5 Evolution"
description = "TPC-H Q5 (Local Supplier Volume) - 5-way join optimization over time"
query = """
SELECT
    n_name,
    SUM(l_extendedprice * (1 - l_discount)) AS revenue
FROM
    customer,
    orders,
    lineitem,
    supplier,
    nation,
    region
WHERE
    c_custkey = o_custkey
    AND l_orderkey = o_orderkey
    AND l_suppkey = s_suppkey
    AND c_nationkey = s_nationkey
    AND s_nationkey = n_nationkey
    AND n_regionkey = r_regionkey
    AND r_name = 'ASIA'
    AND o_orderdate >= DATE '1994-01-01'
    AND o_orderdate < DATE '1994-01-01' + INTERVAL '1' YEAR
GROUP BY
    n_name
ORDER BY
    revenue DESC
"""
dialect = "postgresql"
duration_seconds = 18000
schema = "TPC-H"

# Hardware Profiles
[[hardware_profiles]]
name = "standard"
cpu_cores = 8
total_memory = 32_000_000_000
available_memory = 24_000_000_000
simd_width = 256
has_gpu = false

[[hardware_profiles]]
name = "production"
cpu_cores = 64
total_memory = 256_000_000_000
available_memory = 200_000_000_000
simd_width = 512
has_gpu = false

