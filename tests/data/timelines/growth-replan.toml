# Timeline Configuration: Table Growth Triggers Reoptimization
# Demonstrates how 10x table growth causes join order flip and algorithm change

[metadata]
name = "Table Growth Reoptimization"
description = "10x table growth triggers join order flip: NestedLoop → HashJoin"
query = """
SELECT o.order_id, c.customer_name, SUM(o.total_amount)
FROM orders o
JOIN customers c ON o.customer_id = c.customer_id
WHERE o.order_date >= '2024-01-01'
GROUP BY o.order_id, c.customer_name
"""
dialect = "postgresql"
duration_seconds = 7200
schema = "E-Commerce"

# Hardware Profiles
[[hardware_profiles]]
name = "standard"
cpu_cores = 8
total_memory = 32_000_000_000
available_memory = 24_000_000_000
simd_width = 256
has_gpu = false

# Snapshot 1: Small dataset - nested loop join optimal
[[snapshots]]
time_offset = 0
label = "Initial state - small dataset"
hardware_profile = "standard"

  [snapshots.schema]

    [[snapshots.schema.tables]]
    name = "orders"
    storage_format = "row_based"
    primary_key = ["order_id"]

      [[snapshots.schema.tables.columns]]
      name = "order_id"
      data_type = "integer"

      [[snapshots.schema.tables.columns]]
      name = "customer_id"
      data_type = "integer"

      [[snapshots.schema.tables.columns]]
      name = "order_date"
      data_type = "timestamp"

      [[snapshots.schema.tables.columns]]
      name = "total_amount"
      data_type = "float"

    [[snapshots.schema.tables.indexes]]
    name = "idx_orders_customer"
    index_type = "btree"
    columns = ["customer_id"]

    [[snapshots.schema.tables.indexes]]
    name = "idx_orders_date"
    index_type = "btree"
    columns = ["order_date"]

    [[snapshots.schema.tables]]
    name = "customers"
    storage_format = "row_based"
    primary_key = ["customer_id"]

      [[snapshots.schema.tables.columns]]
      name = "customer_id"
      data_type = "integer"

      [[snapshots.schema.tables.columns]]
      name = "customer_name"
      data_type = "string"

  [[snapshots.statistics.tables]]
  name = "orders"
  row_count = 10_000  # Small table
  page_count = 100
  avg_row_size = 80.0

    [[snapshots.statistics.tables.columns]]
    name = "customer_id"
    ndv = 2_000
    null_fraction = 0.0
    correlation = 0.3

    [[snapshots.statistics.tables.columns]]
    name = "order_date"
    ndv = 365
    null_fraction = 0.0
    correlation = 0.95  # Highly correlated with insertion order

  [[snapshots.statistics.tables]]
  name = "customers"
  row_count = 5_000  # Small customer table
  page_count = 50
  avg_row_size = 100.0

    [[snapshots.statistics.tables.columns]]
    name = "customer_id"
    ndv = 5_000
    null_fraction = 0.0

  [snapshots.facts]
  supports_hash_join = true
  supports_parallel_scan = true
  parallel_workers = 8
  work_mem_bytes = 67108864

