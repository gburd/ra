description = "ANALYZE all tables"

# Test Expectations
[[expectations]]
snapshot_index = 0
expected_plan_pattern = ".*NestedLoop.*"
expected_cost_range = [100.0, 500.0]
rules_applied_must_include = ["filter-pushdown"]
invalidation_trigger = "None"

[[expectations]]
snapshot_index = 1
expected_plan_pattern = ".*HashJoin.*"
expected_cost_range = [1000.0, 5000.0]
rules_applied_must_include = ["hash-join-introduction"]
invalidation_trigger = "Statistics"

[[expectations]]
snapshot_index = 2
expected_plan_pattern = ".*ParallelHash.*"
expected_cost_range = [5000.0, 20000.0]
rules_applied_must_include = ["parallel-hash-join"]
invalidation_trigger = "Statistics"
