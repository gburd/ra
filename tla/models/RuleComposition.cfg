SPECIFICATION Spec
CONSTANTS
    MaxIterations = 100
    MaxNodes = 1000
    MaxEClassSize = 50
    InitialExprs = {{}, {1}, {1, 2}}

INVARIANTS
    TypeOK
    CardinalityBounded
    IterationBounded
    EClassSizeBounded

PROPERTIES
    Termination
    MonotonicGrowth
    EventuallyTerminates

\* Check safety properties (invariants hold in all reachable states)
CHECK_DEADLOCK FALSE

\* Symmetry reduction: treat expression IDs as symmetric
SYMMETRY ExpressionSymmetry
