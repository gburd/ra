SPECIFICATION Spec
CONSTANTS
    MaxCost = 10000
    InitialCost = 5000
    LogicalRules = {r1, r2, r3}
    PhysicalRules = {p1, p2}
    MinCostReduction = 100

\* Define cost reduction range for physical rules
CONSTRAINT CostWithinBounds == cost >= 0 /\ cost <= MaxCost

INVARIANTS
    TypeOK
    CostNonNegative
    LogicalNeverIncreases
    PhysicalMayIncrease

PROPERTIES
    LogicalMonotonicity
    EventualOptimality

\* Temporal properties to check
PROPERTY LogicalMonotonicityTemporal ==
    [](rule_applied \in LogicalRules => cost' <= cost)

PROPERTY PhysicalConvergence ==
    <>(~\E rule \in PhysicalRules :
        \E new_cost \in Real :
            new_cost < cost - MinCostReduction)

CHECK_DEADLOCK FALSE
