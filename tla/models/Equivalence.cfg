SPECIFICATION Spec
CONSTANTS
    Relations = {orders, customers}
    Attributes = {id, customer_id, amount, name}
    Rules = {FilterPushdown, JoinCommutativity, JoinAssociativity}
    MaxTuples = 10

\* Initial database state with small test data
CONSTRAINT SmallDatabase ==
    /\ \A r \in Relations : Cardinality(db[r]) <= MaxTuples
    /\ \A r \in Relations : \A t \in db[r] : \A a \in Attributes : t[a] < 100

INVARIANTS
    TypeOK
    Inv1
    Inv2
    Inv3
    Inv4
    Inv5

PROPERTIES
    SemanticEquivalence
    RuleCorrectness
    Safety

\* Specific rule equivalence properties
PROPERTY FilterPushdownCorrect ==
    []FilterPushdownCorrect

PROPERTY JoinCommutative ==
    []JoinCommutative

PROPERTY JoinAssociative ==
    []JoinAssociative

PROPERTY ProjectFusion ==
    []ProjectFusion

PROPERTY FilterMerge ==
    []FilterMerge

\* Safety property must always hold
PROPERTY SafetyAlways ==
    []Safety

CHECK_DEADLOCK FALSE

\* Symmetry: relation names and tuple orderings are symmetric
SYMMETRY RelationSymmetry
